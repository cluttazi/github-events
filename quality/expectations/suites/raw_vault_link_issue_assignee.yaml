# Hub<->link referential integrity is error severity: loaders write hubs
# before links, so an orphaned key is a loader bug, not late data.
table: raw_vault/link_issue_assignee
layer: silver
checks:
  - type: unique
    columns: [lhk_issue_assignee]
  - type: not_null
    column: lhk_issue_assignee
  - type: referential_integrity
    column: hk_issue
    ref_table: raw_vault/hub_issue
    ref_column: hk_issue
  - type: referential_integrity
    column: hk_actor
    ref_table: raw_vault/hub_actor
    ref_column: hk_actor
