contract: watch_event
version: 1
owner: data-platform@github-events.example
description: >
  Flattened staged schema for GH-Archive WatchEvent (starring) lines.
  Feeds hub_actor, hub_repo, link_actor_repo, and sat_actor_repo_event only.
primary_key: [event_id]
event_time_field: created_at
sla:
  freshness_hours: 24
fields:
  - name: event_id
    type: string
    nullable: false
  - name: actor_login
    type: string
    nullable: false
    pii: true
    pii_category: quasi_identifier
  - name: actor_display_login
    type: string
    nullable: true
    pii: true
    pii_category: quasi_identifier
    description: Actor display login; sat_actor_profile source.
  - name: actor_avatar_url
    type: string
    nullable: true
    pii: true
    pii_category: quasi_identifier
    description: Actor avatar URL; sat_actor_profile source.
  - name: repo_name
    type: string
    nullable: false
  - name: created_at
    type: timestamp
    nullable: false
  - name: action
    type: string
    nullable: false
    allowed_values: [started]
